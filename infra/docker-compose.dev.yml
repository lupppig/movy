services:
  app:
    build:
      context: ..
      dockerfile: infra/dev.Dockerfile
    container_name: booking_app
    ports:
    - "${APP_PORT:-8080}:8080"
    volumes:
      - ../src:/app
      - ../api:/app/api
    depends_on:
      - db
    env_file:
      - ../.env
    command: air

  db:
    image: postgres:16-alpine
    container_name: booking_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: booking
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: