openapi: "3.0.0"
info:
  version: 1.0.0
  title: Booking App API
  description: A robust API for user registration and booking management.

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

paths:
  /health:
    get:
      summary: check server health
      operationId: healthCheck
      tags:
        - Health
      responses:
        "200":
          description: health check returned successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - version
                  - status
                properties:
                  version:
                    type: string
                    example: "1.0.1"
                  status:
                    type: string
                    example: "alive"
  /auth/signup:
    post:
      summary: Register a new user
      operationId: registerUser
      tags:
        - Auth
      requestBody:
        description: User registration details
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"
  /auth/signin:
    post:
      summary: Sign in with email and password
      operationId: signInUser
      tags:
        - Auth
      requestBody:
        description: User sign in credentials
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SigninRequest"
      responses:
        "200":
          description: Sign in successful, returns access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  # --- Reusable Responses ---
  responses:
    BadRequest:
      description: The request body is malformed or syntactically incorrect.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    
    ValidationError:
      description: The data provided failed business logic or validation rules.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationError"

    InternalError:
      description: An unexpected error occurred on the server.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    UnauthorizedError:
      description: Invalid email or password.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  # --- Reusable Schemas (Go Structs) ---
  schemas:
    # Requests
    SignupRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 3
          example: "John Doe"
        email:
          type: string
          format: email
          example: "john@example.com"
        password:
          type: string
          minLength: 8
          example: "strongPassword123!"

    SigninRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: "john@example.com"
        password:
          type: string
          example: "strongPassword123!"

    # Responses
    UserResponse:
      type: object
      required: [id, name, email]
      properties:
        id:
          type: string
          format: uuid
          example: 1
        name:
          type: string
          example: "John Doe"
        email:
          type: string
          format: email
          example: "john@example.com"

    TokenResponse:
      type: object
      required: [access_token, expires_in]
      properties:
        access_token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        expires_in:
          type: integer
          description: Token expiration time in seconds
          example: 3600
    

    # Error Objects
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: "INTERNAL_SERVER_ERROR"
        message:
          type: string
          example: "An unexpected error occurred."
        details:
          type: string
          example: "database connection timeout"

    ValidationError:
      type: object
      required: [message, errors]
      properties:
        message:
          type: string
          example: "Validation failed"
        errors:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"

    FieldError:
      type: object
      required: [field, reason]
      properties:
        field:
          type: string
          example: "email"
        reason:
          type: string
          example: "must be a valid email address"